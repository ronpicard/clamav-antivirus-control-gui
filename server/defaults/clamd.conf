# ClamAV GUI — starter clamd.conf (reset default)
# Adjust paths for your OS: https://docs.clamav.net/manual/Installing.html
# Debian/Ubuntu-style layout below; Homebrew on macOS often uses /opt/homebrew/var/...

DatabaseDirectory /var/lib/clamav
LogFile /var/log/clamav/clamd.log
PidFile /run/clamav/clamd.pid
LocalSocket /run/clamav/clamd.ctl
FixStaleSocket true
Foreground false
TCPSocket 3310
TCPAddr 127.0.0.1
MaxThreads 12
ReadTimeout 300
SendBufTimeout 200
MaxDirectoryRecursion 20
MaxScanSize 100M
MaxFileSize 25M
